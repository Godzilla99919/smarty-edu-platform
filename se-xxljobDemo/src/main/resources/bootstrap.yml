server:
  port: 8099  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  profiles:
    active: dev
  application:
      name: xxljobdemo-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs: # 共享配置
          - data-id: shared-spring.yaml # 共享spring配置
            refresh: false
          - data-id: shared-redis.yaml # 共享redis配置
            refresh: false
          - data-id: shared-mybatis.yaml # 共享mybatis配置
            refresh: false
          - data-id: shared-logs.yaml # 共享日志配置
            refresh: false
          - data-id: shared-feign.yaml # 共享feign配置
            refresh: false
          - data-id: shared-mq.yaml # 共享mq配置
            refresh: false
          - data-id: shared-xxljob.yaml # 共享xxlJob配置
            refresh: false
se:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.smartyedu.xxljobdemo.controller
    title: Smarty Edu Platform - 学习中心接口文档
    description: 该服务包含用户学习的各种辅助功能
    contact-name: Godzilla99919
    contact-url: https://github.com/Godzilla99919
    contact-email: godzilla99919@users.noreply.github.com
    version: v1.0
  jdbc:
    database: tj_learning
  auth:
    resource:
      enable: true
